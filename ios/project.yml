name: OPLINKStreamTest
options:
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: 150.0.0
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
targets:
  OPLINKStreamTest:
    type: application
    platform: iOS
    sources:
      - path: OPLINKStreamTest
    dependencies:
      - package: WebRTC
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gamer32024.oplink.streamtest
        PRODUCT_NAME: OPLINKStreamTest
        INFOPLIST_FILE: OPLINKStreamTest/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "0.5.1"
        CURRENT_PROJECT_VERSION: "8"
        CODE_SIGN_STYLE: Automatic
schemes:
  OPLINKStreamTest:
    build:
      targets:
        OPLINKStreamTest: all
    run:
      config: Debug
    archive:
      config: Release
