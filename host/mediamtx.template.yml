logLevel: info
logDestinations: [stdout]

api: true
apiAddress: 127.0.0.1:9997

rtsp: true
rtspAddress: 127.0.0.1:8554
rtspTransports: [tcp]

rtmp: false
hls: false
srt: false
moq: false

webrtc: true
webrtcAddress: 127.0.0.1:8889
webrtcEncryption: false
webrtcAllowOrigins: ["*"]
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: ""
webrtcIPsFromInterfaces: false
webrtcIPsFromInterfacesList: []
webrtcAdditionalHosts: ["__TAILSCALE_IPV4__"]
webrtcICEServers2: []

authMethod: internal
authInternalUsers:
  - user: any
    pass:
    permissions:
      - action: publish
  - user: any
    pass:
    permissions:
      - action: read
  - user: any
    pass:
    ips: ["127.0.0.1", "::1"]
    permissions:
      - action: api

paths:
  all_others:
    source: publisher

